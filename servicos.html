<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Serviços | Barbearia Madero</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Montserrat:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <link rel="stylesheet" href="style.css?v=2026.final">
</head>
<body class="services-page">

    <header class="header-minimal">
        <div class="container header-flex">
            <a href="index.html" class="logo-container">
                <i class="fas fa-cut logo-icon"></i>
                <div class="logo-text">
                    <span class="logo-madero">MADERO</span>
                    <span class="logo-barbearia">Barbearia Premium</span>
                </div>
            </a>
            <nav class="nav-desktop">
                <a href="index.html">Início</a>
                <a href="servicos.html" class="active">Serviços</a>
            </nav>
        </div>
    </header>

    <section class="page-header">
        <div class="container">
            <h2 class="section-title">Nossos Serviços</h2>
            <div class="gold-divider" style="margin: 10px auto;"></div>
            <p class="section-tag">Porto Velho - RO</p>
        </div>
    </section>

    <section class="services-content">
        <div class="container">
            <div class="services-grid" id="servicesGrid">
                </div>
        </div>
    </section>

    <div id="bookingModal" class="modal">
        <div class="modal-content">
            <span class="close-modal" onclick="closeBooking()">&times;</span>
            <h3 id="selectedServiceName">SERVIÇO</h3>

            <div class="calendar-wrapper">
                <div class="days-container" id="daysContainer"></div>
            </div>

            <div class="booking-steps">
                <h4>1. ESCOLHA O PROFISSIONAL</h4>
                <div class="prof-circles">
                    <div class="prof-item" onclick="selectProf(this, 'João')">
                        <img src="https://via.placeholder.com/60/111/d4af37?text=J" alt="João">
                        <span>João</span>
                    </div>
                    <div class="prof-item" onclick="selectProf(this, 'Ruan')">
                        <img src="https://via.placeholder.com/60/111/d4af37?text=R" alt="Ruan">
                        <span>Ruan</span>
                    </div>
                    <div class="prof-item" onclick="selectProf(this, 'Vanclei')">
                        <img src="https://via.placeholder.com/60/111/d4af37?text=V" alt="Vanclei">
                        <span>Vanclei</span>
                    </div>
                </div>

                <div id="timeSelection" style="display:none;">
                    <h4>2. HORÁRIOS DISPONÍVEIS</h4>
                    <div class="time-grid">
                        <div class="time-slot" onclick="finishBooking('09:00')">09:00</div>
                        <div class="time-slot" onclick="finishBooking('10:00')">10:00</div>
                        <div class="time-slot" onclick="finishBooking('11:00')">11:00</div>
                        <div class="time-slot" onclick="finishBooking('14:00')">14:00</div>
                        <div class="time-slot" onclick="finishBooking('15:00')">15:00</div>
                        <div class="time-slot" onclick="finishBooking('16:00')">16:00</div>
                        <div class="time-slot" onclick="finishBooking('17:00')">17:00</div>
                        <div class="time-slot" onclick="finishBooking('18:00')">18:00</div>
                        <div class="time-slot" onclick="finishBooking('19:00')">19:00</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
